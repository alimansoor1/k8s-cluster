# Argo CD config — minimal, single-replica for personal cluster.

global:
  domain: argocd.local   # only used by the UI; access via port-forward

configs:
  params:
    server.insecure: true   # we port-forward locally, no public TLS
  cm:
    application.resourceTrackingMethod: annotation
    timeout.reconciliation: 60s

server:
  replicas: 1
  service:
    type: ClusterIP   # we port-forward; no LB

controller:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

applicationSet:
  enabled: true

notifications:
  enabled: false

dex:
  enabled: false   # we use the default admin user
