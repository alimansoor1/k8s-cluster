# Cilium config for Talos + kube-proxy replacement.
# See https://docs.cilium.io/en/stable/installation/k8s-install-helm/

cluster:
  name: valheim
  id: 1

ipam:
  mode: kubernetes

kubeProxyReplacement: true
k8sServiceHost: REPLACE_WITH_CP_EIP   # set to your CP EIP
k8sServicePort: 6443

# Cilium needs these on Talos
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

operator:
  replicas: 1   # single AZ — one replica is fine

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: false   # enable later if you want the dashboard
