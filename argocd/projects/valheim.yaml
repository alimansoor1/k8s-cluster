apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: valheim
  namespace: argocd
spec:
  description: Valheim cluster apps
  sourceRepos:
    - "*"
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
