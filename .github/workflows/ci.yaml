name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Python deps
        working-directory: pulumi/stacks/prod
        run: uv sync --all-groups

      - name: Ruff check
        working-directory: pulumi/stacks/prod
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: pulumi/stacks/prod
        run: uv run ruff format --check .

      - name: Pyright
        working-directory: pulumi/stacks/prod
        run: uv run pyright .

      - name: Shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          find scripts talos/scripts -name "*.sh" -print0 | xargs -0 shellcheck

      - name: yamllint
        run: |
          pipx install yamllint
          yamllint -d relaxed apps argocd infrastructure

  kubeconform:
    name: Validate K8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Kustomize + kubeconform on Valheim manifests
        run: |
          kustomize build apps/valheim-world-1/overlays/prod | kubeconform -strict -summary -

  pulumi-preview:
    name: Pulumi preview (prod)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Install Pulumi deps
        working-directory: pulumi/stacks/prod
        run: uv sync

      - name: Pulumi preview
        uses: pulumi/actions@v5
        with:
          command: preview
          stack-name: prod
          work-dir: pulumi/stacks/prod
          comment-on-pr: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
